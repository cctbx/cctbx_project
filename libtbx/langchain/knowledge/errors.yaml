# ================================================================
# PHENIX AI Agent — Stop Reason Codes (P1B)
# ================================================================
#
# This file defines the STOP_REASON_CODES that the THINK node
# may emit in its stop_reason_code field.  It is the single
# source of truth for:
#
#   (a) The codes that graph_state.STOP_REASON_CODES validates
#       against (the code set is defined in graph_state.py and
#       must be kept in sync with the entries here)
#   (b) The in-prompt reference table shown to the LLM
#       (generated by thinking_prompts.build_stop_reason_table())
#
# IMPORTANT: if you add or remove a code here, also update
#   agent/graph_state.py :: STOP_REASON_CODES
#   knowledge/thinking_prompts.py :: _STOP_REASON_CODES fallback
#
# SCHEMA PER ENTRY:
#   code:              Exact string used in stop_reason_code field
#   summary:           One-line description (reserved for future use)
#   trigger_evidence:  What the log must show to justify this code
#   negative_constraint: Situations where this code must NOT be used
#   example_log_fragment: Short representative log excerpt (optional)
#
# ================================================================

stop_reason_codes:

  - code: WRONG_MTZ
    summary: MTZ file has wrong content for this workflow step
    trigger_evidence: >
      MTZ file passed to the program contains the wrong column types for
      this step — e.g. MR output columns (FWT/PHWT) where a phased MTZ
      with HL coefficients is expected; or a reflection file whose space
      group or unit cell does not match the model or the session metadata.
    negative_constraint: >
      R-free is simply high or data quality is poor but the file is the
      correct type and content for this step.
    example_log_fragment: >
      overall_best_refine_data.mtz: columns FWT PHWT present;
      HL coefficients absent; AutoBuild cannot proceed

  - code: WRONG_SPACE_GROUP
    summary: Space group mismatch between model and data
    trigger_evidence: >
      Refinement or phasing log explicitly reports a space group mismatch
      between the reflection file and the model.  R-factor is above 0.65
      in the first cycle accompanied by geometry error messages consistent
      with wrong symmetry operators being applied.
    negative_constraint: >
      R-free is merely stalling or the map looks poor without an explicit
      mismatch message in the log.
    example_log_fragment: >
      REFMAC5: Space group from reflection file (P 21) inconsistent with
      model (P 21 21 21); R-factor 0.72 after cycle 1

  - code: MISMATCHED_SEQUENCE
    summary: Sequence file does not match the electron density or model
    trigger_evidence: >
      Log shows explicit residue mismatch errors, unplaced atoms errors,
      or AutoBuild reports sequence identity below ~25% to the placed
      model.  Model building is failing on the majority of residues across
      multiple cycles.
    negative_constraint: >
      R-free is simply high or model building is slow but not reporting
      explicit sequence or residue errors.
    example_log_fragment: >
      AutoBuild: sequence identity 12% to placed model; unplaced atoms on
      residues 1-150; 0 residues built after 3 cycles

  - code: NO_SOLUTION_FOUND
    summary: Phasing search exhausted with no placed model
    trigger_evidence: >
      Phaser, AutoSol, or SHELX explicitly reports that no solution was
      found after exhausting the search.  LLG is negative or TFZ is below
      5 after rotation and translation search.  The log contains a clear
      "no solution" or "search exhausted" message.
    negative_constraint: >
      Refinement is stalling or R-free is not converging — that is
      REASONLESS_DIVERGENCE. Only use after a phasing program has
      explicitly given up.
    example_log_fragment: >
      Phaser: LLG = -42.3, TFZ = 3.1 after rotation + translation search;
      No solution found; search exhausted

  - code: REASONLESS_DIVERGENCE
    summary: R-free diverging with no diagnosable cause
    trigger_evidence: >
      R-free has increased over 3 or more consecutive refinement cycles
      with no error messages and geometry remaining within normal bounds.
      There is no diagnosable cause (wrong file, wrong symmetry, sequence
      mismatch) that would justify a more specific code.
    negative_constraint: >
      There is a specific error message in the log — use the more specific
      code instead. Also do not use after only one or two bad cycles;
      require at least three consecutive increases.
    example_log_fragment: >
      Cycles 8-11: R-free 0.31 -> 0.34 -> 0.38 -> 0.41; no error
      messages; bond RMS 0.008 (normal range)
